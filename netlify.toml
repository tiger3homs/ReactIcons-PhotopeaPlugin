[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp", "react-icons"]
  included_node_modules = ["react-icons", "sharp"]

[[redirects]]
  from = "/icons/*"
  to = "/.netlify/functions/icon/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/plugin.json"
  to = "/.netlify/functions/plugin-config"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
